name: ${{ values.app_name }}-cicd

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ '${{ steps.sha.outputs.short }}' }}
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ '${{ secrets.DOCKERHUB_USERNAME }}' }}
          password: ${{ '${{ secrets.DOCKERHUB_TOKEN }}' }}
      -
        name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: jtandy/${{ values.app_name }}:${{'${{ steps.sha.outputs.short }}'}}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4

      -
        name: Modify values for Argo CD
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: yq -i '.image.tag = "${{'${{ needs.ci.outputs.commit_id }}'}}"' charts/${{ values.app_name }}/values-${{ values.app_env }}.yaml
      -
        name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          message: "Updates values.yaml with commit id ${{ '${{ needs.ci.outputs.commit_id }}' }}"
      -
        name: Install Argo CD CLI
        run: |
          # Grab the latest version number
          VERSION=$(curl -s "https://api.github.com/repos/argoproj/argo-cd/releases/latest" | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')

          # Download from GitHub directly using the -f flag so it fails instantly if it 404s
          curl -f -sSL -o argocd "https://github.com/argoproj/argo-cd/releases/download/$VERSION/argocd-linux-amd64"

          # Make executable and move to PATH
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
      -
        name: Ensure argocd repo and app
        shell: bash
        run: |

          # Connects the argocd repo
          repo="https://github.com/jtandy13-test-org/${{ values.app_name }}.git"
          argocd repo list | grep -q $repo || argocd repo add $repo

          # Creates the argocd app
          argocd app get ${{ values.app_name }} || argocd app create ${{ values.app_name }} \
            --repo $repo \
            --path charts/${{ values.app_name }} \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace ${{ values.app_env }} \
            --values values-${{ values.app_env }}.yaml \
            --revision main \
            --sync-policy manual \
            --sync-option CreateNamespace=true
      -
        name: Argocd app sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}
          argocd app sync ${{ values.app_name }}
          argocd app wait ${{ values.app_name }} --timeout 180